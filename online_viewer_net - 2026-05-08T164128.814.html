<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MUKIT NEXUS PRIME | AI TREND ANALYZER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['El Messiri', 'sans-serif'] },
          colors: { primary: '#4f46e5', secondary: '#0ea5e9', accent: '#8b5cf6', bgLight: '#f8fafc' },
          animation: { blob: 'blob 7s infinite', enter: 'enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards' },
          keyframes: {
            blob: { '0%': { transform: 'translate(0px, 0px) scale(1)' }, '33%': { transform: 'translate(30px, -50px) scale(1.1)' }, '66%': { transform: 'translate(-20px, 20px) scale(0.9)' }, '100%': { transform: 'translate(0px, 0px) scale(1)' } },
            enter: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'El Messiri', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.8); }
    .view-section { display: none; opacity: 0; transition: opacity 0.4s ease; position: absolute; inset: 0; width: 100%; height: 100%; }
    .view-section.active { display: flex; opacity: 1; position: relative; }
    .grad-big { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    .grad-small { background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .permanent-badge { background: rgba(79, 70, 229, 0.1); border: 1px dashed #4f46e5; }
  </style>
</head>
<body>

<div class="animate-bg-blob w-72 h-72 top-0 -left-10 animate-blob fixed opacity-40 bg-indigo-300 blur-[90px] rounded-full"></div>
<div class="animate-bg-blob w-72 h-72 bottom-0 -right-10 animate-blob animation-delay-2000 fixed opacity-40 bg-purple-300 blur-[90px] rounded-full"></div>

<div class="w-full h-full max-w-md mx-auto relative flex flex-col">

  <div id="view-login" class="view-section h-full flex flex-col items-center justify-center px-8 animate-enter active">
    <div class="text-center mb-10">
      <div class="w-24 h-24 mx-auto bg-gradient-to-br from-indigo-500 to-violet-600 rounded-3xl flex items-center justify-center shadow-2xl mb-6 transform rotate-3">
        <i class="fas fa-brain text-5xl text-white"></i>
      </div>
      <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase">Nexus <span class="text-indigo-600">Prime</span></h1>
      <p class="text-[10px] font-bold text-slate-500 tracking-[0.4em] mt-2">AI LIVE TREND ANALYZER v4.0</p>
    </div>

    <div class="glass w-full rounded-[2rem] p-8 shadow-2xl border border-white">
      <div class="mb-6 flex justify-center">
        <span class="permanent-badge text-indigo-600 text-[10px] font-black px-4 py-1.5 rounded-full uppercase">Full Signal Access</span>
      </div>
      <button onclick="enterApp()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold text-xs tracking-[0.2em] flex justify-center items-center gap-3 shadow-xl active:scale-95 transition-all">
        <span>INITIALIZE ENGINE</span>
        <i class="fas fa-bolt"></i>
      </button>
      <p class="mt-6 text-center text-[9px] font-bold text-slate-400">JOIN <a href="https://t.me/VERSION_X_COMMUNITY" class="text-indigo-500">@VERSION_X_COMMUNITY</a></p>
    </div>
  </div>

  <div id="view-dashboard" class="view-section flex-col h-full bg-[#f8fafc]">
    <div class="px-6 pt-6 pb-3 flex justify-between items-center bg-white/60 backdrop-blur-md sticky top-0 z-20 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center shadow-lg">
          <i class="fas fa-microchip text-sm"></i>
        </div>
        <div>
          <h2 class="font-bold text-slate-800 text-sm leading-none">NEXUS PRIME</h2>
          <span id="pattern-status" class="text-[8px] font-black text-indigo-500 tracking-widest uppercase">Unrestricted Mode</span>
        </div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto hide-scroll px-5 pb-10">
      <div class="mt-4 p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Trend Heatmap</span>
            <span id="confidence-score" class="text-[10px] font-black text-indigo-600">--% CONFIDENCE</span>
        </div>
        <div id="heatmap" class="flex gap-2 overflow-hidden justify-between">
            </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-3">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
          <p class="text-[8px] font-bold text-slate-400 tracking-widest mb-1 uppercase">Period</p>
          <h2 id="periodDisplay" class="text-2xl font-black text-slate-800 tracking-widest">----</h2>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
          <p class="text-[8px] font-bold text-slate-400 tracking-widest mb-1 uppercase">Timer</p>
          <h2 id="timerDisplay" class="text-2xl font-black text-indigo-600 font-mono">30</h2>
        </div>
      </div>

      <div class="mt-5 bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 flex flex-col items-center justify-center relative overflow-hidden">
        <div id="pattern-name" class="text-[10px] font-black text-slate-300 tracking-[0.2em] uppercase mb-4">Analyzing Momentum</div>
        
        <div class="relative w-48 h-48 flex items-center justify-center">
          <div class="absolute inset-0 border-2 border-slate-50 rounded-full animate-spin duration-[15s]"></div>
          <div id="orbCore" class="w-40 h-40 rounded-full bg-slate-50 shadow-inner flex flex-col items-center justify-center transition-all duration-500 z-10 overflow-hidden relative border-4 border-white">
            <div id="ui-loading" class="flex flex-col items-center">
              <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
              <span class="text-[9px] font-black text-slate-400 tracking-widest uppercase animate-pulse">Syncing AI</span>
            </div>
            <div id="ui-result" class="flex-col items-center justify-center w-full h-full absolute inset-0 bg-white hidden">
              <h1 id="res-text" class="text-5xl font-black italic tracking-tighter leading-none text-white drop-shadow-lg">BIG</h1>
              <span class="text-[9px] font-black text-slate-400 tracking-[0.3em] border border-slate-100 px-3 py-1 rounded-full mt-3 uppercase">Confirmed</span>
            </div>
          </div>
        </div>
        <div class="mt-6 text-center">
          <p id="status-text" class="text-[11px] font-bold text-slate-400 tracking-[0.1em] uppercase">Engine Standby</p>
        </div>
      </div>

      <div class="mt-8">
        <h3 class="text-xs font-black text-slate-800 tracking-widest mb-4 px-1 uppercase">Pattern History</h3>
        <div id="history-list" class="space-y-3"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const UI = {
    login: document.getElementById('view-login'),
    dash: document.getElementById('view-dashboard'),
    timer: document.getElementById('timerDisplay'),
    period: document.getElementById('periodDisplay'),
    orb: document.getElementById('orbCore'),
    loader: document.getElementById('ui-loading'),
    result: document.getElementById('ui-result'),
    resText: document.getElementById('res-text'),
    status: document.getElementById('status-text'),
    history: document.getElementById('history-list'),
    patternName: document.getElementById('pattern-name'),
    confidence: document.getElementById('confidence-score'),
    heatmap: document.getElementById('heatmap')
  };

  const state = {
    lastPeriod: "0",
    activePred: null
  };

  let lastTickCounter = -1;

  function get30sCounter() {
    const d = new Date();
    return Math.floor((d.getMinutes() * 60 + d.getSeconds()) / 30);
  }

  function tick() {
    const d = new Date();
    const s = d.getSeconds();
    let rem = (30 - (s % 30)) || 30;
    UI.timer.innerText = rem < 10 ? `0${rem}` : rem;
    UI.timer.className = rem <= 5 ? "text-2xl font-black font-mono text-rose-500" : "text-2xl font-black font-mono text-indigo-600";

    const currentCounter = get30sCounter();
    if (currentCounter !== lastTickCounter) {
      lastTickCounter = currentCounter;
      fetchData();
    }
  }

  function analyze4Layer(nextPeriod, history) {
    if (history.length < 3) return { side: "BIG", conf: "70%", name: "TREND SYNC" };
    const last3 = history.slice(0, 3).map(x => parseInt(x.number) >= 5 ? "BIG" : "SMALL");
    
    // Pattern 1: Triple Big Break (B B B -> S)
    if (last3[0] === "BIG" && last3[1] === "BIG" && last3[2] === "BIG") {
        return { side: "SMALL", conf: "94%", name: "TRIPLE BIG BREAK" };
    }
    // Pattern 2: Double Small Continuation (S S -> B)
    if (last3[0] === "SMALL" && last3[1] === "SMALL") {
        return { side: "BIG", conf: "89%", name: "SMALL REBOUND" };
    }

    const bias = (parseInt(nextPeriod.slice(-1)) + parseInt(history[0].number)) % 2 === 0 ? "BIG" : "SMALL";
    return { side: bias, conf: "78%", name: "LIVE MOMENTUM" };
  }

  async function fetchData() {
    try {
      const r = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?t=" + Date.now());
      const d = await r.json();
      const list = d.data.list;
      if (!list || list.length === 0) return;

      const latest = list[0];
      const nextPeriod = (BigInt(latest.issueNumber) + 1n).toString();
      UI.period.innerText = nextPeriod.slice(-4);

      if (state.activePred && state.lastPeriod === latest.issueNumber) {
        const actual = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
        addHistory(latest.issueNumber, state.activePred, actual);
      }

      updateHeatmap(list);

      if (nextPeriod !== state.lastPeriod) {
        resetOrb();
        setTimeout(() => {
          const analysis = analyze4Layer(nextPeriod, list);
          state.activePred = analysis.side;
          state.lastPeriod = nextPeriod;
          revealResult(analysis);
        }, 3000); 
      }
    } catch (e) {
      console.warn("API Error");
    }
  }

  function resetOrb() {
    UI.orb.className = "w-40 h-40 rounded-full bg-slate-50 shadow-inner flex flex-col items-center justify-center transition-all duration-500 z-10 border-4 border-white";
    UI.loader.classList.remove('hidden');
    UI.result.classList.add('hidden');
    UI.status.innerText = "SCANNING PATTERNS...";
    UI.patternName.innerText = "LAYER 4 ANALYSIS";
  }

  function revealResult(data) {
    UI.loader.classList.add('hidden');
    UI.result.classList.replace('hidden', 'flex');
    UI.resText.innerText = data.side;
    UI.confidence.innerText = `${data.conf} CONFIDENCE`;
    UI.patternName.innerText = data.name;
    UI.orb.className = `w-40 h-40 rounded-full ${data.side === 'BIG' ? 'grad-big' : 'grad-small'} shadow-2xl flex flex-col items-center justify-center border-4 border-white/50`;
    UI.status.innerText = "ANALYSIS COMPLETE";
    if (navigator.vibrate) navigator.vibrate([40, 20, 40]);
  }

  function updateHeatmap(list) {
    UI.heatmap.innerHTML = '';
    list.slice(0, 10).reverse().forEach(item => {
        const dot = document.createElement('div');
        dot.className = `w-3 h-3 rounded-full ${parseInt(item.number) >= 5 ? 'bg-blue-500' : 'bg-pink-500'} shadow-sm`;
        UI.heatmap.appendChild(dot);
    });
  }

  function addHistory(period, pred, actual) {
    const isWin = pred === actual;
    const el = document.createElement('div');
    el.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center animate-enter";
    const color = isWin ? "text-emerald-500" : "text-rose-500";
    el.innerHTML = `
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400"><i class="fas fa-clock-rotate-left text-[10px]"></i></div>
        <div>
          <p class="text-[9px] font-black text-slate-400 uppercase">${period.slice(-4)}</p>
          <p class="text-[11px] font-black ${color} uppercase">${pred} - ${isWin ? 'STRIKE' : 'MISS'}</p>
        </div>
      </div>
      <span class="text-[10px] font-black text-slate-800 bg-slate-50 px-3 py-1 rounded-lg">RES: ${actual}</span>
    `;
    UI.history.prepend(el);
    if (UI.history.children.length > 10) UI.history.lastElementChild.remove();
  }

  window.enterApp = () => {
    UI.login.classList.remove('active');
    UI.dash.classList.add('active');
    setInterval(tick, 1000);
    fetchData();
  };
})();
</script>
</body></html>
